<div class="space-y-6">
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-lg font-medium leading-5 text-gray-900">
                Danh Sách Đại Lý
            </h1>
            <p class="mt-2 text-md leading-4 text-gray-500">
                Quản lý tài khoản, hồ sơ, cửa hàng và tài khoản ngân hàng của đại lý
            </p>
        </div>

        <button type="button" (click)="openCreateModal()"
            class="rounded-md bg-gray-900 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-gray-800">
            Thêm đại lý
        </button>
    </div>

    <app-filter [fields]="filterFields" [initialValues]="filter()" (filterChange)="onFilterChange($event)">
    </app-filter>

    <div></div>

    <app-table [columns]="columns" [rows]="rows()" [currentPage]="page()" [totalPages]="totalPages()"
        [loading]="loading()" [sortBy]="sortBy()" [asc]="asc()" emptyText="Không có đại lý"
        (rowClick)="openDetail($event)" (pageChange)="onPageChange($event)" (sortChange)="onSortChange($event)">
    </app-table>
</div>

@if (isDetailRendered() && selectedAgent()) {
<app-pop-up-agent-detail [agent]="selectedAgent()!" [isOpen]="isDetailOpen()" (closed)="closeDetail()">
</app-pop-up-agent-detail>
}

@if (isAddOpen()) {
<app-pop-up-agent-add
    [isSubmitting]="isSubmitting()"
    (closed)="closeCreateModal()"
    (submitted)="createAgent($event)"
>
</app-pop-up-agent-add>
}
