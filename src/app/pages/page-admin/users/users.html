<div class="space-y-6">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h1 class="font-display text-xl font-bold tracking-wide text-white">
        Danh Sách Người Dùng
      </h1>
      <p class="mt-2 text-sm leading-5 text-white/40">
        Quản lý tài khoản, hồ sơ của người dùng
      </p>
    </div>
  </div>

  <app-filter
    [fields]="filterFields"
    [initialValues]="filter()"
    (filterChange)="onFilterChange($event)"
  >
  </app-filter>

  <div></div>

  <app-table
    [columns]="columns"
    [rows]="rows()"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    [loading]="loading()"
    [sortBy]="sortBy()"
    [asc]="asc()"
    emptyText="Không có người dùng"
    (rowClick)="openDetail($event)"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
  >
  </app-table>
</div>

@if (isDetailRendered() && selectedUser()) {
<app-pop-up-user-detail
  [user]="selectedUser()!"
  [isOpen]="isDetailOpen()"
  (closed)="closeDetail()"
>
</app-pop-up-user-detail>
}
