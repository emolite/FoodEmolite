<div class="store-detail-backdrop fixed inset-0 z-50 bg-black/60 backdrop-blur-sm" [class.store-detail-backdrop-open]="isOpen()">
    <div class="store-detail-panel absolute right-0 top-0 flex h-full w-[520px] flex-col border-l border-white/10 bg-[#1a1035] shadow-2xl"
        [class.store-detail-panel-open]="isOpen()">

        <div class="flex h-14 items-center justify-between border-b border-white/10 px-6">
            <div class="flex items-center gap-3">
                <div class="flex h-9 w-9 items-center justify-center rounded-full bg-violet-600/15 text-violet-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-store-icon lucide-store">
                        <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5" />
                        <path
                            d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244" />
                        <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05" />
                    </svg>
                </div>

                <h2 class="font-display text-xl font-bold tracking-wide text-white">
                    Chi Tiết Cửa Hàng
                </h2>
            </div>

            <button type="button" (click)="close()"
                class="text-2xl leading-none text-white/40 transition hover:text-white cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-x-icon lucide-x">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </button>
        </div>

        <div class="custom-scroll flex-1 overflow-y-auto px-6 py-6">

            <div class="flex items-start gap-5">

                <label
                    class="group relative h-20 w-20 cursor-pointer overflow-hidden rounded-full border border-white/10 bg-white/5 shadow-sm">

                    @if (previewUrl()) {
                    <img [src]="previewUrl()" class="h-full w-full object-cover">
                    } @else {
                    <div class="flex h-full w-full items-center justify-center text-xl font-semibold text-white/30">
                        {{ store().storeName.charAt(0) }}
                    </div>
                    }

                    <div
                        class="absolute inset-0 flex items-center justify-center bg-black/50 text-xs font-medium text-white opacity-0 transition group-hover:opacity-100">
                        Đổi ảnh
                    </div>

                    <input type="file" accept="image/*" class="hidden" (change)="onFileChange($event)">
                </label>

                <div class="min-w-0 flex-1">

                    <h3 class="font-display truncate text-lg font-bold tracking-wide text-white">
                        {{ store().storeName }}
                    </h3>

                    <span class="mt-2 inline-flex rounded-full px-2.5 py-1 text-xs font-medium"
                        [class.bg-emerald-500\/15]="formIsActive()" [class.text-emerald-300]="formIsActive()"
                        [class.bg-red-500\/15]="!formIsActive()" [class.text-red-400]="!formIsActive()">
                        {{ formIsActive() ? 'Đang hoạt động' : 'Ngừng hoạt động' }}
                    </span>
                </div>
            </div>

            <div class="mt-8 space-y-4">

                <div class="grid grid-cols-[120px_1fr] items-center gap-4">
                    <label class="text-sm text-white/40">
                        Tên cửa hàng
                    </label>

                    <input type="text" [ngModel]="formStoreName()" (ngModelChange)="formStoreName.set($event)"
                        class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
                </div>

                <div class="grid grid-cols-[120px_1fr] items-center gap-4">
                    <label class="text-sm text-white/40">
                        Số điện thoại
                    </label>

                    <input type="text" [ngModel]="formPhoneNumber()" (ngModelChange)="formPhoneNumber.set($event)"
                        class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
                </div>

                <div class="grid grid-cols-[120px_1fr] items-center gap-4">
                    <label class="text-sm text-white/40">
                        Địa chỉ
                    </label>

                    <input type="text" [ngModel]="formAddress()" (ngModelChange)="formAddress.set($event)"
                        class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
                </div>

                <div class="grid grid-cols-[120px_1fr] items-start gap-4">
                    <label class="pt-2 text-sm text-white/40">
                        Mô tả
                    </label>

                    <textarea rows="4" [ngModel]="formDescription()" (ngModelChange)="formDescription.set($event)"
                        class="w-full resize-none rounded-lg border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
          </textarea>
                </div>

            </div>

            <div class="mt-8 rounded-xl border border-white/10 bg-white/5 p-4">
                <div class="flex items-center justify-between">

                    <div>
                        <h4 class="text-sm font-semibold text-white/80">
                            Trạng thái hoạt động
                        </h4>

                        <p class="mt-1 text-xs text-white/30">
                            Ngừng hoạt động sẽ ẩn cửa hàng khỏi hệ thống
                        </p>
                    </div>

                    <button type="button" (click)="formIsActive.set(!formIsActive())"
                        class="relative h-6 w-10 rounded-full transition cursor-pointer" [class.bg-violet-600]="formIsActive()"
                        [class.bg-white\/10]="!formIsActive()">

                        <span class="absolute top-0.5 h-5 w-5 rounded-full bg-white shadow transition"
                            [class.left-5]="formIsActive()" [class.left-0.5]="!formIsActive()">
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between border-t border-white/10 bg-white/3 px-6 py-4">

            <button type="button" (click)="openConfirmDelete()" [disabled]="isSubmitting()"
                class="rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-2 text-sm font-medium text-red-400 transition hover:bg-red-500/20 disabled:opacity-60 cursor-pointer">
                Xoá Cửa Hàng
            </button>

            <button type="button" (click)="submit()" [disabled]="isSubmitting() || !hasChanged()"
                class="rounded-lg bg-violet-600 px-5 py-2 text-sm font-medium text-white transition hover:bg-violet-500 disabled:cursor-not-allowed disabled:opacity-50 cursor-pointer">
                {{ isSubmitting() ? 'Đang lưu...' : 'Lưu Thay Đổi' }}
            </button>
        </div>
    </div>
</div>

@if (isConfirmDeleteOpen()) {
<app-confirm-popup title="Xoá cửa hàng"
    message="Bạn có chắc chắn muốn xoá cửa hàng này không? Hành động này sẽ khiến cửa hàng không còn hiển thị trong hệ thống."
    confirmText="Xoá cửa hàng" cancelText="Huỷ" [isSubmitting]="isSubmitting()" (cancelled)="closeConfirmDelete()"
    (confirmed)="confirmDelete()">
</app-confirm-popup>
}
