<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
  <div class="w-full max-w-2xl rounded-2xl border border-white/10 bg-[#1a1035] shadow-2xl">
    <div class="flex items-start justify-between border-b border-white/10 px-6 py-5">
      <div>
        <h2 class="font-display text-xl font-bold tracking-wide text-white">
          Thêm Cửa Hàng
        </h2>
        <p class="mt-2 text-sm leading-5 text-white/40">
          Nhập thông tin cửa hàng mới
        </p>
      </div>

      <button type="button" (click)="close()"
        class="cursor-pointer rounded-lg p-2 text-white/40 transition hover:bg-white/10 hover:text-white">
        ✕
      </button>
    </div>

    <div class="space-y-5 px-6 py-5">
      <div>
        <label class="mb-2 block text-sm font-medium text-white/60">
          Ảnh đại diện cửa hàng
        </label>

        <div class="flex items-center gap-4">
          <div
            class="flex h-24 w-24 items-center justify-center overflow-hidden rounded-xl border border-white/10 bg-white/5">
            @if (previewUrl()) {
            <img [src]="previewUrl()" class="h-full w-full object-cover">
            } @else {
            <span class="text-xs text-white/30">Chưa có ảnh</span>
            }
          </div>

          <label
            class="cursor-pointer rounded-lg border border-white/10 bg-white/5 px-4 py-2 text-sm font-medium text-white/70 transition hover:bg-white/10">
            Chọn ảnh
            <input type="file" accept="image/*" class="hidden" (change)="onFileChange($event)">
          </label>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-medium text-white/60">
            Đại lý sở hữu
          </label>

          <app-dropdown [options]="agentOptions()"
            [placeholder]="isLoadingAgents() ? 'Đang tải đại lý...' : 'Chọn đại lý'" [searchable]="true"
            searchPlaceholder="Tìm đại lý..." [value]="formOwnerAccountId()" [disabled]="isLoadingAgents()"
            (changed)="onAgentChange($event?.value)">
          </app-dropdown>
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-white/60">
            Tên cửa hàng
          </label>
          <input type="text" [ngModel]="formStoreName()" (ngModelChange)="formStoreName.set($event)"
            class="w-full rounded-md border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-white/60">
            Số điện thoại
          </label>
          <input type="text" [ngModel]="formPhoneNumber()" (ngModelChange)="formPhoneNumber.set($event)"
            class="w-full rounded-md border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
        </div>
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-white/60">
          Địa chỉ
        </label>
        <input type="text" [ngModel]="formAddress()" (ngModelChange)="formAddress.set($event)"
          class="w-full rounded-md border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-white/60">
          Mô tả
        </label>
        <textarea rows="4" [ngModel]="formDescription()" (ngModelChange)="formDescription.set($event)"
          class="w-full resize-none rounded-md border border-white/10 bg-white/5 px-3 py-2.5 text-sm text-white outline-none transition focus:border-violet-500/50">
        </textarea>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-white/10 px-6 py-5">
      <button type="button" (click)="close()"
        class="cursor-pointer rounded-lg border border-white/10 bg-white/5 px-4 py-2 text-sm font-medium text-white/70 transition hover:bg-white/10">
        Huỷ
      </button>

      <button type="button" (click)="submit()" [disabled]="isSubmitting()"
        class="cursor-pointer rounded-lg bg-violet-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-violet-500 disabled:opacity-60">
        {{ isSubmitting() ? 'Đang lưu...' : 'Thêm cửa hàng' }}
      </button>
    </div>
  </div>
</div>
