<div class="space-y-6">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h1 class="font-display text-xl font-bold tracking-wide text-white">
        Danh Sách Cửa Hàng
      </h1>
      <p class="mt-2 text-sm leading-5 text-white/40">
        Quản lý thông tin cửa hàng trên hệ thống
      </p>
    </div>

    <button type="button" (click)="openCreateModal()"
      class="cursor-pointer rounded-lg bg-violet-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-violet-500">
      Thêm cửa hàng
    </button>
  </div>

  <app-filter [fields]="filterFields" [initialValues]="filter()" (filterChange)="onFilterChange($event)">
  </app-filter>
  <div></div>
  <app-table [columns]="columns" [rows]="rows()" [currentPage]="page()" [totalPages]="totalPages()"
    [loading]="loading() || isDetailLoading()" emptyText="Không có cửa hàng" (rowClick)="openDetail($event)"
    (pageChange)="onPageChange($event)" (sortChange)="onSortChange($event)"?>
  </app-table>
</div>

@if (isAddOpen()) {
<app-pop-up-store-add [isSubmitting]="isSubmitting()" (closed)="closeCreateModal()" (submitted)="createStore($event)">
</app-pop-up-store-add>
}

@if (isDetailRendered() && selectedStore()) {
<app-pop-up-store-detail [store]="selectedStore()!" [isSubmitting]="isSubmitting()" [isOpen]="isDetailOpen()"
  (closed)="closeDetail()" (submitted)="updateStore($event)" (deleted)="deleteStore($event)">
</app-pop-up-store-detail>
}
