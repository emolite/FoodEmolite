<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4">
  <div class="w-full max-w-xl rounded-md bg-white shadow-xl">

    <div class="flex items-center justify-between border-b border-blue-100 px-5 py-4">
      <div>
        <h2 class="text-base font-semibold text-gray-900">
          Thêm danh mục
        </h2>

        <p class="mt-1 text-sm text-gray-500">
          Tạo danh mục món ăn mới
        </p>
      </div>

      <button
        type="button"
        (click)="close()"
        class="text-gray-400 hover:text-gray-600">
        ✕
      </button>
    </div>

    <div class="space-y-4 p-5">

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700">
          Tên danh mục
        </label>

        <input
          type="text"
          [(ngModel)]="form().categoryName"
          placeholder="Ví dụ: Đồ ăn nhanh"
          class="w-full rounded-md border border-blue-100 px-3 py-2 text-sm outline-none focus:border-blue-500" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700">
          Mô tả
        </label>

        <textarea
          rows="4"
          [(ngModel)]="form().description"
          placeholder="Nhập mô tả danh mục"
          class="w-full rounded-md border border-blue-100 px-3 py-2 text-sm outline-none focus:border-blue-500">
        </textarea>
      </div>

    </div>

    <div class="flex justify-end gap-2 border-t border-blue-100 px-5 py-4">
      <button
        type="button"
        (click)="close()"
        class="rounded-md border border-blue-100 px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-blue-50">
        Hủy
      </button>

      <button
        type="button"
        (click)="submit()"
        [disabled]="isSubmitting"
        class="rounded-md bg-blue-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50">
        Lưu
      </button>
    </div>

  </div>
</div>
