<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
  <div class="w-full max-w-xl rounded-md bg-[#171322] border border-[#322a4a] shadow-xl">

    <div class="flex items-center justify-between border-b border-[#322a4a] px-5 py-4">
      <div>
        <h2 class="text-base font-semibold text-violet-200">
          Thêm danh mục
        </h2>

        <p class="mt-1 text-sm text-gray-400">
          Tạo danh mục món ăn mới
        </p>
      </div>

      <button
        type="button"
        (click)="close()"
        class="text-gray-400 transition hover:text-violet-300">
        ✕
      </button>
    </div>

    <div class="space-y-4 p-5">

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-300">
          Tên danh mục
        </label>

        <input
          type="text"
          [(ngModel)]="form().categoryName"
          placeholder="Ví dụ: Đồ ăn nhanh"
          class="h-[42px] w-full rounded-lg border border-[#322a4a] bg-[#1a1628] px-3 text-sm text-white placeholder:text-gray-500 outline-none transition hover:border-violet-500/60 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-300">
          Mô tả
        </label>

        <textarea
          rows="4"
          [(ngModel)]="form().description"
          placeholder="Nhập mô tả danh mục"
          class="w-full rounded-lg border border-[#322a4a] bg-[#1a1628] px-3 py-2 text-sm text-white placeholder:text-gray-500 outline-none transition hover:border-violet-500/60 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/20">
        </textarea>
      </div>

    </div>

    <div class="flex justify-end gap-2 border-t border-[#322a4a] px-5 py-4">
      <button
        type="button"
        (click)="close()"
        class="rounded-md border border-[#322a4a] bg-[#1a1628] px-4 py-2.5 text-sm font-medium text-gray-300 transition hover:border-violet-500 hover:bg-violet-500/10">
        Hủy
      </button>

      <button
        type="button"
        (click)="submit()"
        [disabled]="isSubmitting"
        class="rounded-md bg-violet-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-violet-500 disabled:cursor-not-allowed disabled:opacity-50">
        Lưu
      </button>
    </div>

  </div>
</div>
