<div class="space-y-6">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h1 class="text-lg font-medium leading-5 text-gray-900">
        Danh Sách Danh Mục
      </h1>

      <p class="mt-2 text-md leading-4 text-gray-500">
        Quản lý danh mục món ăn của cửa hàng
      </p>
    </div>

    <button
      type="button"
      (click)="openCreateModal()"
      class="rounded-md bg-blue-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-blue-700">
      Thêm danh mục
    </button>
  </div>

  <app-filter
    [fields]="filterFields"
    [initialValues]="filter()"
    (filterChange)="onFilterChange($event)">
  </app-filter>
  <div></div>
  <app-table
    [columns]="columns"
    [rows]="rows()"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    [loading]="loading()"
    [sortBy]="sortBy()"
    [asc]="asc()"
    emptyText="Không có danh mục"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)">
  </app-table>
</div>

@if (isAddOpen()) {
  <app-pop-up-agent-food-category-add
    [isSubmitting]="isSubmitting()"
    (closed)="closeCreateModal()"
    (submitted)="createCategory($event)">
  </app-pop-up-agent-food-category-add>
}
