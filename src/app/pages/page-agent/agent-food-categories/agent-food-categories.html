<div class="space-y-6">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h1 class="md:text-[20px] font-semibold text-violet-400 uppercase tracking-widest">
        Danh Sách Danh Mục
      </h1>

      <p class="mt-2 text-md leading-4 text-gray-500">
        Quản lý danh mục món ăn của cửa hàng
      </p>
    </div>

    <button
      type="button"
      (click)="openCreateModal()"
      class="flex items-center justify-between gap-2 rounded-md bg-violet-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-violet-500 cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-circle-plus-icon lucide-circle-plus">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 12h8" />
        <path d="M12 8v8" />
      </svg>
      Thêm danh mục
    </button>
  </div>

  <app-filter
    [fields]="filterFields"
    [initialValues]="filter()"
    (filterChange)="onFilterChange($event)">
  </app-filter>
  <div></div>
  <app-table
    [columns]="columns"
    [rows]="rows()"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    [loading]="loading()"
    [sortBy]="sortBy()"
    [asc]="asc()"
    emptyText="Không có danh mục"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)">
  </app-table>
</div>

@if (isAddOpen()) {
  <app-pop-up-agent-food-category-add
    [isSubmitting]="isSubmitting()"
    (closed)="closeCreateModal()"
    (submitted)="createCategory($event)">
  </app-pop-up-agent-food-category-add>
}
