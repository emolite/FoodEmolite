<div class="flex min-h-screen bg-slate-950">
  <section class="hidden flex-1 bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900 lg:block"></section>

  <section
    class="relative flex min-h-screen w-full items-center justify-center border-slate-800 bg-slate-950 px-6 lg:w-[520px] lg:border-l">
    <button type="button" routerLink="/"
      class="absolute left-8 top-8 inline-flex items-center gap-2 text-sm text-slate-400 transition hover:text-white">
      <span class="text-xl leading-none">‹</span>
      Trang chủ
    </button>

    <div class="w-full max-w-md">
      <h1 class="text-4xl font-bold text-white">
        Đăng nhập
      </h1>

      <p class="mt-2 text-sm text-slate-400">
        Chào mừng bạn quay trở lại
      </p>

      <form class="mt-8 space-y-4" (ngSubmit)="login()">
        <input
          class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400 focus:bg-slate-900"
          type="text" autocomplete="username" placeholder="Email hoặc username" [ngModel]="input()"
          (ngModelChange)="input.set($event)" name="input" />

        <div class="relative">
          <input
            class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 pr-12 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400 focus:bg-slate-900"
            [type]="showPassword() ? 'text' : 'password'" autocomplete="current-password" placeholder="Mật khẩu"
            [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" />

          <button type="button" (click)="togglePassword()"
            class="absolute right-3 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-800 hover:text-white">
            @if (showPassword()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-eye-off-icon lucide-eye-off">
              <path
                d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
              <path d="m2 2 20 20" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-eye-icon lucide-eye">
              <path
                d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            }
          </button>
        </div>

        @if (errorMessage()) {
        <div class="rounded-md border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300">
          {{ errorMessage() }}
        </div>
        }

        <button type="submit"
          class="flex w-full items-center justify-center rounded-md bg-white py-4 font-semibold text-slate-950 transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="isLoading()">
          @if (isLoading()) {
          <span class="mr-2 h-4 w-4 animate-spin rounded-full border-2 border-slate-400 border-t-slate-950"></span>
          Đang đăng nhập...
          } @else {
          Đăng nhập
          }
        </button>

        <p class="pt-4 text-center text-sm text-slate-400">
          Chưa có tài khoản?
          <a class="font-semibold text-white hover:underline" routerLink="/register">
            Đăng ký
          </a>
        </p>
      </form>
    </div>
  </section>
</div>
