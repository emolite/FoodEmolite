<div class="flex min-h-screen bg-slate-950">
  <section class="hidden flex-1 bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900 lg:block"></section>

  <section
    class="relative flex min-h-screen w-full items-center justify-center border-slate-800 bg-slate-950 px-6 lg:w-[520px] lg:border-l">
    <button type="button" routerLink="/login"
      class="absolute left-8 top-8 inline-flex items-center gap-2 text-sm text-slate-400 transition hover:text-white">
      <span class="text-xl leading-none">‹</span>
      Quay lại
    </button>

    <div class="w-full max-w-md">
      <h1 class="text-4xl font-bold text-white">Đăng ký</h1>
      <p class="mt-2 text-sm text-slate-400">Tạo tài khoản mới</p>

      <div class="mt-8 space-y-4">
        <input
          class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400"
          type="text" placeholder="Username" [ngModel]="username()" (ngModelChange)="username.set($event)" />

        <input
          class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400"
          type="email" placeholder="Email" [ngModel]="email()" (ngModelChange)="onEmailChange($event)"
          (blur)="checkEmail()" />

        @if (email() && !isEmailValid()) {
        <p class="text-sm text-red-400">
          Email không đúng định dạng
        </p>
        }

        @if (isCheckingEmail()) {
        <p class="text-sm text-slate-400">Đang kiểm tra email...</p>
        }

        <input
          class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400"
          type="password" placeholder="Mật khẩu" [ngModel]="password()" (ngModelChange)="password.set($event)" />

        <input
          class="w-full rounded-md border border-slate-700 bg-slate-900/70 px-4 py-4 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-slate-400"
          type="password" placeholder="Nhập lại mật khẩu" [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)" />

        @if (errorMessage()) {
        <div class="rounded-md border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300">
          {{ errorMessage() }}
        </div>
        }

        @if (successMessage()) {
        <div class="rounded-md border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm text-green-300">
          {{ successMessage() }}
        </div>
        }

        <button
          class="flex w-full items-center justify-center rounded-md bg-white py-4 font-semibold text-slate-950 transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="isLoading()" (click)="register()">
          {{ isLoading() ? 'Đang đăng ký...' : 'Đăng ký' }}
        </button>

        <p class="pt-4 text-center text-sm text-slate-400">
          Đã có tài khoản?
          <a class="font-semibold text-white hover:underline" routerLink="/login">
            Đăng nhập
          </a>
        </p>
      </div>
    </div>
  </section>
</div>
