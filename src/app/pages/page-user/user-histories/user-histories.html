<div class="relative h-full overflow-hidden bg-[#0f0d1a] text-white">
    <div class="flex h-full flex-col">
        <div class="flex items-center justify-between border-b border-white/5 bg-[#130f21] px-5 py-4">
            <div>
                <h1 class="text-lg font-semibold uppercase tracking-widest text-violet-400">
                    Lịch sử đơn hàng
                </h1>
                <p class="mt-1 text-sm text-white/40">
                    Theo dõi các đơn hàng đã đặt
                </p>
            </div>

            <button type="button" (click)="back()" class="rounded-xl border border-violet-500/20
                       bg-white/5
                       px-4 py-2
                       text-sm font-medium text-white/80
                       transition-all duration-200
                       hover:border-violet-500/40
                       hover:bg-violet-500/10">

                Quay lại

            </button>

        </div>


        <div class="min-h-0 flex-1 custom-scroll overflow-y-auto">
            <div class="flex h-full">
                <section class="min-h-0 overflow-y-auto p-4 transition-all" [class.w-full]="!selectedOrder()"
                    [class.w-2/3]="selectedOrder()">
                    @if (loading()) {

                    <div class="flex h-full items-center justify-center">

                        <div class="flex flex-col items-center">

                            <div class="h-12 w-12 rounded-full
                                        border-4 border-violet-500/20
                                        border-t-violet-500
                                        animate-spin">
                            </div>

                            <p class="mt-5 text-sm text-white/50">
                                Đang tải lịch sử đơn hàng...
                            </p>

                        </div>

                    </div>
                    } @else {
                 @if (orders().length === 0) {
                    <div class="flex h-full items-center justify-center">
                        <div class="text-center">
                            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center
                                        rounded-full bg-white/5">

                                <svg class="h-8 w-8 text-white/20" fill="none" stroke="currentColor" stroke-width="2"
                                    viewBox="0 0 24 24">

                                    <path d="M3 3h18v18H3z" />
                                    <path d="M8 7h8" />
                                    <path d="M8 11h8" />
                                    <path d="M8 15h5" />

                                </svg>

                            </div>
                            <p class="text-sm text-white/40">
                                Bạn chưa có đơn hàng nào
                            </p>
                        </div>
                    </div>
                    } @else {
                    <div class="space-y-3">
                        @for (order of orders(); track order.id) {
                        <button type="button" (click)="openPayment(order)" class="w-full rounded-2xl
                                   border border-white/5
                                   bg-white/[0.03]
                                   p-4
                                   text-left
                                   transition-all duration-200

                                   hover:-translate-y-0.5
                                   hover:border-violet-500/30
                                   hover:bg-violet-500/5
                                   hover:shadow-lg
                                   hover:shadow-violet-500/10"
                            [class.border-violet-500/40]="selectedOrder()?.id === order.id"
                            [class.bg-violet-500/10]="selectedOrder()?.id === order.id">
                            <div class="flex items-start justify-between gap-3">
                                <div class="min-w-0">
                                    <p class="truncate text-sm font-semibold text-white">
                                        Đơn hàng #{{ order.orderCode }}
                                    </p>
                                    <p class="mt-1 text-xs text-white/40">
                                        {{ formatDate(order.createdAt) }}
                                    </p>
                                </div>
                                <p class="shrink-0 text-sm font-bold text-violet-400">
                                    {{ formatCurrency(order.totalAmount) }}
                                </p>
                            </div>
                            <div class="mt-4 flex flex-wrap gap-2">
                                <span class="inline-flex items-center rounded-full px-3 py-1
                                           text-xs font-semibold
                                           ring-1 ring-inset" [class]="getOrderStatusBadgeClass(order.orderStatus)">

                                    {{ getOrderStatusText(order.orderStatus) }}

                                </span>
                                <span class="inline-flex items-center rounded-full px-3 py-1
                                           text-xs font-semibold
                                           ring-1 ring-inset"
                                    [class]="getPaymentStatusBadgeClass(order.paymentStatus)">

                                    {{ getPaymentStatusText(order.paymentStatus) }}

                                </span>
                            </div>
                            @if (order.note) {

                            <p class="mt-3 line-clamp-2 text-sm text-white/40">
                                {{ order.note }}
                            </p>

                            }
                        </button>
                        }


                    </div>
                    }
                    }
                </section>


                @if (selectedOrder()) {

                <aside class="min-h-0 w-1/3 border-l border-white/5 bg-[#130f21]">

                    <app-user-order-payment-popup [order]="selectedOrder()!" (closed)="closePayment()">

                    </app-user-order-payment-popup>

                </aside>

                }


            </div>

        </div>



        <!-- PAGINATION -->
        @if (totalPages() > 1) {

        <div class="border-t border-white/5 bg-[#130f21]">

            <app-pagination [currentPage]="page()" [totalPages]="totalPages()" variant="admin"
                (pageChange)="onPageChange($event)">
            </app-pagination>

        </div>

        }


    </div>

</div>
