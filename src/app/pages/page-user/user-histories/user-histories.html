<div class="relative h-full overflow-hidden bg-white">
    <div class="flex h-full flex-col">
        <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4">
            <div>
                <h1 class="text-lg font-semibold text-gray-900">
                    Lịch sử đơn hàng
                </h1>

                <p class="mt-1 text-sm text-gray-500">
                    Theo dõi các đơn hàng đã đặt
                </p>
            </div>

            <button type="button" (click)="back()"
                class="rounded-md border border-gray-200 px-3 py-2 text-sm font-medium text-gray-700 transition hover:border-gray-900 hover:bg-gray-50">
                Quay lại
            </button>
        </div>

        <div class="min-h-0 flex-1 overflow-y-auto p-4">
            @if (loading()) {
            <div class="py-10 text-center text-sm text-gray-500">
                Đang tải lịch sử đơn hàng...
            </div>
            } @else {
            @if (orders().length === 0) {
            <div class="flex h-full items-center justify-center text-sm text-gray-400">
                Bạn chưa có đơn hàng nào
            </div>
            } @else {
            <div class="space-y-3">
                @for (order of orders(); track order.id) {
                <button type="button" (click)="openPayment(order)"
                    class="w-full rounded-md border border-gray-200 bg-white p-4 text-left transition hover:border-gray-900 hover:shadow-sm">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <p class="text-sm font-semibold text-gray-900">
                                Đơn hàng #{{ order.orderCode}}
                            </p>

                            <p class="mt-1 text-xs text-gray-500">
                                {{ formatDate(order.createdAt) }}
                            </p>
                        </div>

                        <p class="shrink-0 text-sm font-bold text-gray-900">
                            {{ formatCurrency(order.totalAmount) }}
                        </p>
                    </div>

                    <div class="mt-4 flex flex-wrap gap-2">
                        <span class="rounded-full bg-gray-100 px-2.5 py-1 text-xs font-medium text-gray-700">
                            {{ getOrderStatusText(order.orderStatus) }}
                        </span>

                        <span class="rounded-full bg-gray-100 px-2.5 py-1 text-xs font-medium text-gray-700">
                            {{ getPaymentStatusText(order.paymentStatus) }}
                        </span>
                    </div>

                    @if (order.note) {
                    <p class="mt-3 line-clamp-2 text-sm text-gray-500">
                        {{ order.note }}
                    </p>
                    }
                </button>
                }
            </div>
            }
            }
        </div>

        @if (totalPages() > 1) {
        <div class="border-t border-gray-200">
            <app-pagination
                [currentPage]="page()"
                [totalPages]="totalPages()"
                variant="admin"
                (pageChange)="onPageChange($event)">
            </app-pagination>
        </div>
        }
    </div>
</div>

@if (selectedOrder()) {
<app-user-order-payment-popup
    [order]="selectedOrder()!"
    (closed)="closePayment()">
</app-user-order-payment-popup>
}
