<div class="mx-auto w-full max-w-7xl space-y-4 px-5 py-6 bg-[#0f0d1a]">
  <div>
    <h1 class="md:text-[20px] font-semibold text-violet-400 uppercase tracking-widest">
      Cửa Hàng
    </h1>

    <p class="mt-2 text-sm leading-5 text-gray-500">
      Chọn cửa hàng để xem danh sách món ăn
    </p>
  </div>

  @if (loading()) {
  <div class="flex flex-col items-center justify-center py-16">

    <div class="relative">
      <div class="absolute inset-0 rounded-full bg-violet-500/20 blur-xl">
      </div>

      <div class="relative h-12 w-12 animate-spin rounded-full
             border-[3px]
             border-violet-500/15
             border-t-violet-400
             border-r-fuchsia-400">
      </div>
    </div>

    <p class="mt-5 text-sm tracking-wide text-white/50">
      Đang tải danh sách cửa hàng...
    </p>

  </div>
  } @else {
  <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (store of stores(); track store.id) {
    <button type="button" (click)="openStoreFoods(store)" class="group overflow-hidden rounded-3xl
         border border-violet-500/15
         bg-[#1a1035]
         text-left
         transition-all duration-300
         hover:-translate-y-1
         hover:border-violet-500/30
         hover:shadow-2xl hover:shadow-violet-900/30">

      <div class="relative h-44 overflow-hidden">
        @if (store.thumbnailUrl) {
        <img [src]="store.thumbnailUrl"
          class="h-full w-full object-cover transition duration-500 group-hover:scale-110" />
        } @else {
        <div class="flex h-full items-center justify-center
             bg-gradient-to-br
             from-violet-900
             via-[#1a1035]
             to-[#0f0d1a]">

          <span class="text-sm text-violet-300/60 font-semibold">
            Emolite Food
          </span>
        </div>
        }

        <!-- overlay -->
        <div class="absolute inset-0
             bg-gradient-to-t
             from-[#0f0d1a]
             via-transparent
             to-transparent">
        </div>
      </div>

      <div class="space-y-3 p-5">

        <h2 class="line-clamp-1 text-lg font-bold text-white">
          {{ store.storeName }}
        </h2>

        <p class="line-clamp-2 min-h-10 text-sm leading-6 text-white/55">
          {{ store.description || 'Chưa có mô tả' }}
        </p>

        <p class="line-clamp-1 text-xs text-violet-300/50">
          {{ store.address || 'Chưa cập nhật địa chỉ' }}
        </p>

        <div class="flex items-center gap-2
             pt-2
             text-sm
             font-semibold
             text-violet-400
             transition
             group-hover:gap-3">

          Xem món ăn

          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">

            <path d="M18 8L22 12L18 16" />
            <path d="M2 12H22" />

          </svg>

        </div>

      </div>

    </button>
    }
  </div>
  }
</div>
