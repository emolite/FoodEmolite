<div class="mx-auto w-full max-w-7xl space-y-4 px-5 py-6">
  <div>
    <h1 class="text-xl font-semibold leading-6 text-gray-900">
      Cửa Hàng
    </h1>

    <p class="mt-2 text-sm leading-5 text-gray-500">
      Chọn cửa hàng để xem danh sách món ăn
    </p>
  </div>

  @if (loading()) {
  <div class="rounded-md border border-gray-200 bg-white px-4 py-10 text-center text-sm text-gray-500">
    Đang tải danh sách cửa hàng...
  </div>
  } @else {
  <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (store of stores(); track store.id) {
    <button
      type="button"
      (click)="openStoreFoods(store)"
      class="group overflow-hidden rounded-md border border-gray-200 bg-white text-left shadow-sm transition hover:-translate-y-0.5 hover:border-gray-900 hover:shadow-md">

      <div class="h-36 bg-gray-100">
        @if (store.thumbnailUrl) {
        <img
          [src]="store.thumbnailUrl"
          class="h-full w-full object-cover transition group-hover:scale-105" />
        } @else {
        <div class="flex h-full items-center justify-center text-xs text-gray-400">
          Food Emolite
        </div>
        }
      </div>

      <div class="space-y-3 p-4">
        <h2 class="line-clamp-1 text-sm font-semibold text-gray-900">
          {{ store.storeName }}
        </h2>

        <p class="line-clamp-2 min-h-10 text-xs leading-5 text-gray-500">
          {{ store.description || 'Chưa có mô tả' }}
        </p>

        <p class="line-clamp-1 text-xs text-gray-400">
          {{ store.address || 'Chưa cập nhật địa chỉ' }}
        </p>

        <div class="pt-1 text-xs font-semibold text-gray-900">
          Xem món ăn →
        </div>
      </div>
    </button>
    }
  </div>
  }
</div>
