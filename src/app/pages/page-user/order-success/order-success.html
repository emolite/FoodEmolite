<div class="relative flex min-h-screen items-center justify-center overflow-hidden bg-[#0f0d1a] px-4">

    <!-- Background -->
    <div class="absolute -left-24 -top-24 h-80 w-80 rounded-full bg-violet-600/20 blur-3xl"></div>
    <div class="absolute -right-24 bottom-0 h-72 w-72 rounded-full bg-fuchsia-500/10 blur-3xl"></div>

    <div
        class="relative w-full max-w-md rounded-3xl border border-violet-500/15 bg-[#1a1035] p-8 text-center shadow-2xl shadow-violet-950/40 animate-[fadeIn_.35s_ease]">

        <!-- Success Icon -->
        <div class="relative mx-auto flex h-24 w-24 items-center justify-center">

            <div class="absolute inset-0 rounded-full bg-green-500/20 animate-ping"></div>

            <div
                class="relative flex h-20 w-20 items-center justify-center rounded-full border border-green-400/30 bg-green-500/15">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-10 w-10 text-green-400"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="2.8"
                     stroke="currentColor">

                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M4.5 12.75l6 6 9-13.5" />

                </svg>

            </div>

        </div>

        <span
            class="mt-6 inline-block rounded-full bg-green-500/10 px-3 py-1 text-xs font-semibold uppercase tracking-widest text-green-400">
            Thành công
        </span>

        <h1 class="mt-4 text-3xl font-bold text-white">
            Thanh toán thành công
        </h1>

        <p class="mt-2 text-sm leading-6 text-white/50">
            Cảm ơn bạn đã đặt hàng.
            Đơn hàng của bạn đã được ghi nhận và đang chờ cửa hàng xử lý.
        </p>

        @if (hasOrderCode()) {

        <div
            class="mt-8 space-y-4 rounded-2xl border border-white/5 bg-[#130f21] p-5">

            <div class="flex items-center justify-between">

                <span class="text-sm text-white/40">
                    Mã đơn hàng
                </span>

                <span class="font-mono text-sm font-semibold text-violet-300">
                    {{ orderCode() }}
                </span>

            </div>

            @if (totalAmount() > 0) {

            <div class="flex items-center justify-between">

                <span class="text-sm text-white/40">
                    Số tiền
                </span>

                <span class="text-lg font-bold text-green-400">
                    {{ formatCurrency(totalAmount()) }}
                </span>

            </div>

            }

        </div>

        }

        <button
            (click)="backToStores()"
            class="mt-8 flex w-full items-center justify-center rounded-xl bg-violet-600 py-3 text-sm font-semibold text-white transition-all duration-200 hover:-translate-y-0.5 hover:bg-violet-500 hover:shadow-lg hover:shadow-violet-600/30 active:scale-[0.98]">

            Quay về cửa hàng

        </button>

    </div>

</div>
