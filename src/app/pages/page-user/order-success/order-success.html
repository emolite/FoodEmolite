<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-sm rounded-2xl bg-white shadow-lg p-6 text-center">

        <div class="mx-auto w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <h1 class="mt-4 text-xl font-bold text-gray-900">Thanh toán thành công</h1>
        <p class="mt-1 text-sm text-gray-500">Cảm ơn bạn đã đặt hàng</p>

        @if (hasOrderCode()) {
        <div class="mt-5 rounded-xl bg-gray-50 border border-gray-100 p-4 text-left space-y-2.5">
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-500">Mã đơn hàng</span>
                <span class="text-sm font-semibold text-gray-900">{{ orderCode() }}</span>
            </div>

            @if (totalAmount() > 0) {
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-500">Số tiền</span>
                <span class="text-sm font-semibold text-gray-900">{{ formatCurrency(totalAmount()) }}</span>
            </div>
            }
        </div>
        }

        <div class="mt-6 flex flex-col gap-2.5">
            <!-- <button (click)="viewHistory()"
                    class="w-full rounded-lg bg-gray-900 text-white py-2.5 text-sm font-medium hover:bg-gray-800 transition-colors">
                Xem lịch sử đơn hàng
            </button> -->

            <button (click)="backToStores()"
                    class="w-full rounded-lg border border-gray-200 text-gray-700 py-2.5 text-sm font-medium hover:bg-gray-50 transition-colors">
                Về trang cửa hàng
            </button>
        </div>

    </div>

</div>
