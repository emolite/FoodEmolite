<div class="fixed right-5 top-5 z-[9999] space-y-3">
  @for (toast of toastService.toasts(); track toast.id) {
  <div
    class="flex min-w-[320px] max-w-sm items-start gap-3 rounded-xl border bg-white px-4 py-3 text-slate-900 shadow-lg transition-all duration-300 animate-in slide-in-from-right-5 fade-in zoom-in-95"
    [class.border-emerald-200]="toast.type === 'success'"
    [class.bg-emerald-50]="toast.type === 'success'"
    [class.border-red-200]="toast.type === 'error'"
    [class.bg-red-50]="toast.type === 'error'">

    <div
      class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full"
      [class.bg-emerald-100]="toast.type === 'success'"
      [class.bg-red-100]="toast.type === 'error'">

      @if (toast.type === 'success') {
      <svg class="h-5 w-5 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5" />
      </svg>
      }

      @if (toast.type === 'error') {
      <svg class="h-5 w-5 text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6L6 18" />
        <path d="M6 6l12 12" />
      </svg>
      }
    </div>

    <div class="min-w-0 flex-1">
      <p class="text-sm font-semibold text-slate-900">
        {{ toast.type === 'success' ? 'Thành công' : 'Có lỗi xảy ra' }}
      </p>

      <p class="mt-0.5 text-sm leading-5 text-slate-700">
        {{ toast.message }}
      </p>
    </div>
  </div>
  }
</div>
