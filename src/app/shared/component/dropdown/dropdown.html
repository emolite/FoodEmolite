<div class="relative w-full" (click)="$event.stopPropagation()">
  <button
    type="button"
    (click)="toggle()"
    [disabled]="disabled"
    class="flex w-full min-w-[160px] cursor-pointer items-center justify-between
           rounded-lg border border-[#322a4a]
           bg-[#1a1628]
           px-4 py-2.5
           text-left text-sm text-white
           outline-none transition
           hover:border-violet-500/60
           focus:border-violet-500
           focus:ring-2 focus:ring-violet-500/20
           disabled:cursor-not-allowed
           disabled:opacity-50"

    [class.border-violet-500]="isOpen">

    <span
      [class.text-gray-500]="!selectedOption"
      [class.text-white]="selectedOption">
      {{ selectedOption?.label || placeholder }}
    </span>

    <svg
      class="h-4 w-4 text-violet-300 transition-transform duration-200"
      [class.rotate-180]="isOpen"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 9l-7 7-7-7" />
    </svg>

  </button>

  @if (isOpen) {

  <div
    class="absolute z-50 mt-2 min-w-full overflow-hidden
           rounded-xl border border-[#322a4a]
           bg-[#171322]
           shadow-2xl">

    @if (searchable) {

    <div class="border-b border-[#322a4a] p-2">

      <input
        type="text"
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearch()"
        [placeholder]="searchPlaceholder"
        (click)="$event.stopPropagation()"

        class="w-full rounded-lg
               border border-[#322a4a]
               bg-[#1a1628]
               px-3 py-2
               text-sm text-white
               placeholder:text-gray-500
               outline-none transition
               focus:border-violet-500
               focus:ring-2 focus:ring-violet-500/20" />

    </div>

    }

    <ul class="custom-scroll max-h-56 overflow-y-auto">

      @if (filteredOptions.length === 0) {

      <li class="px-4 py-3 text-center text-sm text-gray-500">
        Không có kết quả
      </li>

      }

      @for (option of filteredOptions; track option.value) {

      <li
        (click)="select(option)"

        class="flex items-center justify-between
               px-4 py-2.5
               text-sm
               transition"

        [class.cursor-pointer]="!option.disabled"
        [class.cursor-not-allowed]="option.disabled"

        [class.opacity-40]="option.disabled"

        [class.bg-violet-600]="option.value === value"
        [class.text-white]="option.value === value"

        [class.text-gray-200]="option.value !== value"
        [class.hover:bg-violet-500/15]="option.value !== value">

        {{ option.label }}

        @if (option.value === value) {

        <svg
          class="h-4 w-4 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7" />
        </svg>

        }

      </li>

      }

    </ul>

  </div>

  }

</div>
