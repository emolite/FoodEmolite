    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md bg-blue-600">

  </div>

  <div class="flex flex-1 flex-col gap-6 overflow-y-auto px-3 py-4">
    <div>
      <p class="mb-2 px-2 text-[10px] font-semibold uppercase tracking-widest text-blue-400">
        Đại lý
      </p>

      <ul class="space-y-0.5">
        <li>
          <a [routerLink]="[urlEndpoint.AGENT_PROFILE]" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
            class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-500 transition-colors hover:bg-blue-50 hover:text-blue-700">
            <svg class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="10" cy="7" r="3" />
              <path d="M4 17a6 6 0 0112 0" stroke-linecap="round" />
            </svg>
            Thông tin
          </a>
        </li>
      </ul>
    </div>

      </p>

      <ul class="space-y-0.5">
        <li>

              <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05" />
            </svg>
            Danh sách danh mục
          </a>
        </li>
        <li>
          <a [routerLink]="[urlEndpoint.AGENT_FOODS]" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
            class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-500 transition-colors hover:bg-blue-50 hover:text-blue-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-store-icon lucide-store">
              <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5" />
              <path
                d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244" />

            </svg>
            Danh sách món ăn
          </a>
        </li>
        <li>
          <a [routerLink]="[urlEndpoint.AGENT_ORDERS]" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"

    <div>
      <p class="mb-2 px-2 text-[10px] font-semibold uppercase tracking-widest text-blue-400">

      </p>
      <ul class="space-y-0.5">
        <li>
          <a [routerLink]="[urlEndpoint.AGENT_REVENUE]" routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
            class="flex items-center gap-2.5 rounded-md px-2 py-2 text-sm font-medium text-gray-500 transition-colors hover:bg-blue-50 hover:text-blue-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-circle-dollar-sign-icon lucide-circle-dollar-sign">

  <div class="border-t border-blue-50 px-3 py-4">
    <div class="flex cursor-pointer items-center gap-2.5 rounded-md px-2 py-2 transition-colors hover:bg-blue-50">
      <div
        class="flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-blue-600 text-xs font-semibold text-white">
        {{ authService.currentUser()?.username?.charAt(0) || 'U' }}
      </div>

      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-semibold text-gray-800">
          {{ authService.currentUser()?.username }}
        </p>
        <p class="truncate text-[11px] text-gray-400">
          {{ authService.currentUser()?.role }}
        </p>
      </div>

      <button type="button" (click)="logout()"
        class="flex h-7 w-7 items-center justify-center rounded-md text-gray-400 transition-colors hover:bg-blue-100 hover:text-blue-700"
        title="Đăng xuất">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" width="15" height="15">
          <path d="M13 4.5h2.5a1 1 0 011 1v9a1 1 0 01-1 1H13" stroke-linecap="round" />
          <path d="M8.5 13.5L12 10l-3.5-3.5M12 10H4" stroke-linecap="round" stroke-linejoin="round" />
